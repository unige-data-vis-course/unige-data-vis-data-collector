name: Lint (flake8)

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  flake8:
    name: Run flake8
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install flake8
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Lint with flake8
        run: |
          # Exclude common build and virtual environment directories
          flake8 \
            --exclude dist,build,venv,.venv,tmp,out \
            --show-source \
            --statistics